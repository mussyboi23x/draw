<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #connect-gate, #lobby, #game { text-align: center; }
        #lobby, #game { display: none; }
        canvas { background: white; border-radius: 4px; cursor: crosshair; margin-top: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .chat { position: fixed; bottom: 15px; right: 15px; width: 250px; height: 300px; background: #252525; border: 1px solid #444; display: flex; flex-direction: column; border-radius: 8px; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; text-align: left; font-size: 13px; }
        input, button { padding: 12px; margin: 8px; border-radius: 6px; border: none; outline: none; }
        input { background: #333; color: white; width: 200px; }
        button { background: #4285f4; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #357ae8; }
    </style>
</head>
<body>

    <!-- STAGE 1: THE IP GATEWAY -->
    <div id="connect-gate">
        <h1>Draw!</h1>
        <p style="color: #888;">Enter Server IP to begin</p>
        <input type="text" id="target-ip" placeholder="0.0.0.0">
        <button onclick="startConnection()">Connect</button>
    </div>

    <!-- STAGE 2: THE LOBBY -->
    <div id="lobby">
        <h1>Draw!</h1>
        <input type="text" id="user-name" placeholder="Name"><br>
        <button onclick="doHost()">Host Game</button>
        <div style="margin: 20px 0; color: #555;">——— OR ———</div>
        <input type="text" id="room-code" placeholder="4-Digit Code">
        <button onclick="doJoin()">Join</button>
    </div>

    <!-- STAGE 3: THE GAME -->
    <div id="game">
        <h2 id="display-room" style="color: #4285f4;"></h2>
        <canvas id="canvas" width="800" height="500"></canvas>
        <div class="chat">
            <div id="msgs"></div>
            <input type="text" id="chat-box" placeholder="Chat here..." onkeypress="if(event.key==='Enter') sendText()" style="width: 85%; margin: 5px auto;">
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        let socket;
        let activeRoom = "";
        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');

        function startConnection() {
            const ip = document.getElementById('target-ip').value;
            if(!ip) return;

            socket = io(`http://${ip}:20100`);

            socket.on('connect', () => {
                document.getElementById('connect-gate').style.display = 'none';
                document.getElementById('lobby').style.display = 'block';
            });

            socket.on('connect_error', () => alert("Connection failed. Check IP."));

            socket.on('game-created', (c) => launch(c));
            socket.on('join-success', (c) => launch(c));
            socket.on('error-msg', (m) => alert(m));
            socket.on('drawing', (d) => renderDraw(d.x, d.y));
            socket.on('receive-chat', (d) => {
                document.getElementById('msgs').innerHTML += `<div><b style="color:#4285f4">${d.name}:</b> ${d.msg}</div>`;
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            });
        }

        function doHost() {
            const n = document.getElementById('user-name').value;
            if(n) socket.emit('host-game', n);
        }

        function doJoin() {
            const n = document.getElementById('user-name').value;
            const c = document.getElementById('room-code').value;
            if(n && c) socket.emit('join-game', { name: n, code: c });
        }

        function launch(c) {
            activeRoom = c;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('display-room').innerText = "Code: " + c;
        }

        // --- DRAW ENGINE ---
        cvs.onmousedown = () => { cvs.down = true; };
        cvs.onmouseup = () => { cvs.down = false; ctx.beginPath(); };
        cvs.onmousemove = (e) => {
            if (!cvs.down) return;
            const r = cvs.getBoundingClientRect();
            const x = e.clientX - r.left;
            const y = e.clientY - r.top;
            renderDraw(x, y);
            socket.emit('drawing', { x, y, room: activeRoom });
        };

        function renderDraw(x, y) {
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function sendText() {
            const i = document.getElementById('chat-box');
            if(i.value) socket.emit('send-chat', { room: activeRoom, msg: i.value });
            i.value = "";
        }
    </script>
</body>
</html>
