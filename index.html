<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickChat | Persistent</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }

        /* Login UI */
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Chat UI */
        #chat-container { width: 95vw; max-width: 600px; height: 80vh; display: flex; flex-direction: column; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #e9ecef; color: var(--text); }
        
        #input-area { display: flex; padding: 15px; border-top: 1px solid #eee; }
        #input-area input { margin: 0 10px 0 0; }
        #logout-btn { background: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>Welcome Back</h2>
        <p style="color: #666; font-size: 14px;">Choose a handle to start chatting</p>
        <input type="text" id="username-in" placeholder="Username...">
        <button onclick="handleLogin()">Join Chat</button>
    </div>

    <div id="chat-screen" class="hidden">
        <div id="chat-container">
            <div style="padding: 10px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <span id="user-display" style="font-weight: bold;"></span>
                <button id="logout-btn" onclick="handleLogout()">Forget Me</button>
            </div>
            <div id="messages">
                <div class="msg them">Hey! This chat will remember you next time you visit.</div>
            </div>
            <div id="input-area">
                <input type="text" id="msg-in" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="width: auto;">Send</button>
            </div>
        </div>
    </div>

<script>
    const loginScreen = document.getElementById('login-screen');
    const chatScreen = document.getElementById('chat-screen');
    const usernameIn = document.getElementById('username-in');
    const userDisplay = document.getElementById('user-display');
    const msgBox = document.getElementById('messages');
    const msgIn = document.getElementById('msg-in');

    // --- 1. PERSISTENCE CHECK ---
    // This runs the moment the page loads
    window.onload = () => {
        const savedUser = localStorage.getItem('chat_username');
        if (savedUser) {
            enterChat(savedUser);
        }
    };

    // --- 2. LOGIN LOGIC ---
    function handleLogin() {
        const name = usernameIn.value.trim();
        if (name.length < 2) return alert("Pick a longer name!");
        
        // Save to device's "Site Data"
        localStorage.setItem('chat_username', name);
        enterChat(name);
    }

    function enterChat(name) {
        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');
        userDisplay.innerText = `Chatting as: ${name}`;
    }

    // --- 3. LOGOUT (CLEANUP) ---
    function handleLogout() {
        if(confirm("Are you sure? You'll have to type your name again next time.")) {
            localStorage.removeItem('chat_username');
            location.reload(); // Refresh to show login screen
        }
    }

    // --- 4. MOCK MESSAGING ---
    function sendMsg() {
        const text = msgIn.value.trim();
        if (!text) return;

        // Add my message to UI
        const el = document.createElement('div');
        el.className = 'msg me';
        el.innerText = text;
        msgBox.appendChild(el);

        msgIn.value = "";
        msgBox.scrollTop = msgBox.scrollHeight;

        // Auto-reply (Simulating a friend)
        setTimeout(() => {
            const reply = document.createElement('div');
            reply.className = 'msg them';
            reply.innerText = "Received! If you refresh this page, you'll still be logged in.";
            msgBox.appendChild(reply);
            msgBox.scrollTop = msgBox.scrollHeight;
        }, 1000);
    }
</script>
</body>
</html>
